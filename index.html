<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Epic AGL Load Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 16px;
        }

        #status {
            padding: 8px;
            background: #eee;
            margin-bottom: 12px;
        }

        #call-controls {
            display: none;
            border: 2px solid #0a0;
            background: #f0fff0;
            padding: 12px;
            margin-bottom: 12px;
        }

        #caller-info {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .call-btn {
            padding: 10px 24px;
            font-size: 15px;
            cursor: pointer;
            margin-right: 8px;
            border: none;
            border-radius: 4px;
            color: #fff;
        }

        #btn-accept { background: #1a7a1a; }
        #btn-decline { background: #a00; }

        #log {
            white-space: pre-wrap;
            background: #111;
            color: #0f0;
            padding: 10px;
            min-height: 200px;
        }
    </style>
</head>

<body onload="onLoad()">
    <h1>AGL Call Control</h1>
    <div id="status">Page loaded, waiting for handshake...</div>

    <div id="call-controls">
        <div id="caller-info"></div>
        <button class="call-btn" id="btn-accept" onclick="acceptCall()">Accept</button>
        <button class="call-btn" id="btn-decline" onclick="declineCall()">Decline</button>
    </div>

    <pre id="log"></pre>

    <script>
        // SMART on FHIR — non-prod client ID from Epic Vendor Services.
        // App must be configured in Vendor Services as an EHR Launch app with
        // scopes: launch openid fhirUser
        const CLIENT_ID = 'b10e3371-a841-4d5d-8c9c-144d5620b376';
        const REDIRECT_URI = 'https://snowbear86.github.io/embeddedcontrols/';

        // Fallback stub identity — used when the page is opened standalone
        // (no ?launch + ?iss from Epic). Replace with real values once SMART
        // on FHIR is wired up in Vendor Services.
        let agentIdentity = {
            id: 'test-agent-001',
            name: 'Test Agent',
            extension: '1111',
            epicUserId: 'TESTUSER',
            fhirPractitionerId: 'stub-practitioner-id'
        };

        // STUB: update this URL after deploying the relay server to Railway
        // Production: replace connectToTCN() with TCN JS SDK initialization
        const RELAY_URL = 'wss://embeddedcontrols-production.up.railway.app';

        let epicToken = null;
        let currentCall = null;
        let tcnSocket = null;

        // ── PKCE helpers ──────────────────────────────────────────────────────

        function b64url(bytes) {
            return btoa(String.fromCharCode(...bytes))
                .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        }

        function generateVerifier() {
            const arr = new Uint8Array(32);
            crypto.getRandomValues(arr);
            return b64url(arr);
        }

        async function deriveChallenge(verifier) {
            const buf = await crypto.subtle.digest(
                'SHA-256', new TextEncoder().encode(verifier));
            return b64url(new Uint8Array(buf));
        }

        // ── SMART on FHIR EHR Launch ──────────────────────────────────────────

        // Called when Epic injects ?launch=<token>&iss=<fhir_base_url>.
        // Discovers SMART endpoints from ISS, then redirects to Epic's auth
        // server. Page will reload at REDIRECT_URI with ?code= when done.
        async function startSmartLaunch(launch, iss) {
            log("SMART EHR launch detected — fetching SMART config...");
            let smartConfig;
            try {
                const res = await fetch(iss + '/.well-known/smart-configuration');
                smartConfig = await res.json();
            } catch (e) {
                log("Failed to fetch SMART configuration — falling back to stub identity",
                    { iss, error: e.message });
                return;
            }

            const verifier = generateVerifier();
            const challenge = await deriveChallenge(verifier);
            const state = b64url(crypto.getRandomValues(new Uint8Array(16)));

            sessionStorage.setItem('pkce_verifier', verifier);
            sessionStorage.setItem('smart_token_url', smartConfig.token_endpoint);
            sessionStorage.setItem('smart_state', state);

            const params = new URLSearchParams({
                response_type: 'code',
                client_id: CLIENT_ID,
                redirect_uri: REDIRECT_URI,
                scope: 'launch openid',
                launch,
                state,
                code_challenge: challenge,
                code_challenge_method: 'S256'
            });

            window.location.href = smartConfig.authorization_endpoint + '?' + params;
            // Page navigates — nothing below runs.
        }

        // Called when Epic redirects back with ?code=<auth_code>.
        // Exchanges code for tokens and extracts agent identity from the ID token.
        async function handleOAuthCallback(code, returnedState) {
            const savedState = sessionStorage.getItem('smart_state');
            if (returnedState !== savedState) {
                log("OAuth state mismatch — aborting (possible CSRF)");
                return;
            }

            const verifier = sessionStorage.getItem('pkce_verifier');
            const tokenUrl = sessionStorage.getItem('smart_token_url');
            sessionStorage.removeItem('pkce_verifier');
            sessionStorage.removeItem('smart_token_url');
            sessionStorage.removeItem('smart_state');

            let tokens;
            try {
                const res = await fetch(tokenUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code,
                        redirect_uri: REDIRECT_URI,
                        client_id: CLIENT_ID,
                        code_verifier: verifier
                    })
                });
                tokens = await res.json();
            } catch (e) {
                log("Token exchange failed — falling back to stub identity",
                    { error: e.message });
                return;
            }

            if (tokens.error) {
                log("Token error — falling back to stub identity", tokens);
                return;
            }

            // The ID token (JWT) carries the fhirUser claim:
            // "fhirUser": "Practitioner/abc123"
            // Decode without verifying signature — trust is established by the
            // TLS + PKCE exchange; client-side sig verification adds no security here.
            if (tokens.id_token) {
                try {
                    const payload = JSON.parse(atob(tokens.id_token.split('.')[1]));
                    agentIdentity = {
                        id: payload.sub,
                        name: payload.name || payload.fhirUser || 'Unknown',
                        fhirPractitionerId: payload.fhirUser || null,
                        epicUserId: payload.sub,
                        // extension is not in the FHIR token — fetch from the
                        // Practitioner resource or TCN identity lookup if needed
                        extension: null
                    };
                    log("Agent identity from SMART on FHIR", agentIdentity);
                } catch (e) {
                    log("Failed to decode ID token — falling back to stub identity",
                        { error: e.message });
                }
            }

            // Strip OAuth params from URL so a page refresh doesn't re-run the flow.
            window.history.replaceState({}, '', REDIRECT_URI);
        }

        // ── UI helpers ────────────────────────────────────────────────────────

        function log(msg, payload) {
            const el = document.getElementById("log");
            el.textContent += msg + (payload ? ": " + JSON.stringify(payload, null, 2) : "") + "\n\n";
            console.log(msg, payload);
        }

        function setStatus(msg) {
            document.getElementById("status").textContent = msg;
        }

        function showCallControls(callerName, callerNumber) {
            document.getElementById("caller-info").textContent =
                "Incoming call: " + callerName + " (" + callerNumber + ")";
            document.getElementById("call-controls").style.display = "block";
        }

        function hideCallControls() {
            document.getElementById("call-controls").style.display = "none";
            currentCall = null;
        }

        function acceptCall() {
            if (!currentCall || !tcnSocket) return;
            // STUB: replace with tcnSdk.answerCall(currentCall.callId)
            tcnSocket.send(JSON.stringify({ tcn: "call.accepted", callId: currentCall.callId }));
            log("Call accepted", { callId: currentCall.callId });
            setStatus("Call accepted");
            hideCallControls();
        }

        function declineCall() {
            if (!currentCall || !tcnSocket) return;
            // STUB: replace with tcnSdk.declineCall(currentCall.callId)
            tcnSocket.send(JSON.stringify({ tcn: "call.declined", callId: currentCall.callId }));
            log("Call declined", { callId: currentCall.callId });
            setStatus("Call declined");
            hideCallControls();
        }

        function handleIncomingCall(msg) {
            currentCall = msg;
            log("Incoming call from TCN", msg);
            setStatus("Incoming call...");

            // Tell Epic to open the phone panel
            window.parent.postMessage({
                token: epicToken,
                action: "Epic.Common.CallManagement.Telephony.Alert",
                args: { Quiet: false }
            }, "*");
            log("TelephoneAlert sent to Epic");

            showCallControls(msg.callerName, msg.callerNumber);
        }

        // ── TCN connection ────────────────────────────────────────────────────

        function connectToTCN() {
            // STUB: replace with TCN JS SDK initialization + sdk.on('call.incoming', handleIncomingCall)
            tcnSocket = new WebSocket(RELAY_URL + '?room=tcn-stub');

            tcnSocket.onopen = () => {
                // Send agent identity to TCN (stub: relay | prod: SDK auth)
                tcnSocket.send(JSON.stringify({ tcn: "connect", agent: agentIdentity }));
                log("Connected to relay — sent identity", agentIdentity);
                setStatus("Connected — Agent: " + agentIdentity.name +
                    (agentIdentity.extension ? " (ext. " + agentIdentity.extension + ")" : ""));
            };

            tcnSocket.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                log("Message from TCN stub", msg);
                if (msg.tcn === "call.incoming") {
                    handleIncomingCall(msg);
                } else if (msg.tcn === "stub-ready") {
                    // Stub just connected — re-send identity in case it missed the first one
                    tcnSocket.send(JSON.stringify({ tcn: "connect", agent: agentIdentity }));
                    log("TCN stub ready — re-sent identity");
                }
            };

            tcnSocket.onerror = () => {
                log("Relay connection error — is the relay server running?");
                setStatus("TCN connection error");
            };

            tcnSocket.onclose = () => {
                log("Relay connection closed");
                setStatus("TCN disconnected");
            };
        }

        // ── AGL message handler ───────────────────────────────────────────────

        function Listener(event) {
            const data = event.data || {};
            log("AGL message received", data);

            for (const type in data) {
                const payload = data[type];
                switch (type) {
                    case "token":
                        epicToken = payload;
                        setStatus("AGL handshake complete — connecting to TCN...");
                        log("AGL token received (raw)", payload);
                        // Try to decode as JWT so we can see what Epic put in it
                        try {
                            const parts = (payload || '').split('.');
                            if (parts.length === 3) {
                                const jwtPayload = JSON.parse(atob(parts[1]));
                                log("AGL token decoded (JWT payload)", jwtPayload);
                                // If Epic includes fhirUser/sub we can use them directly
                                if (jwtPayload.fhirUser || jwtPayload.sub) {
                                    agentIdentity = {
                                        id: jwtPayload.sub || agentIdentity.id,
                                        name: jwtPayload.name || agentIdentity.name,
                                        fhirPractitionerId: jwtPayload.fhirUser || agentIdentity.fhirPractitionerId,
                                        epicUserId: jwtPayload.sub || agentIdentity.epicUserId,
                                        extension: agentIdentity.extension
                                    };
                                    log("Agent identity updated from AGL token", agentIdentity);
                                }
                            } else {
                                log("AGL token is opaque (not a JWT) — length: " + (payload || '').length);
                            }
                        } catch (e) {
                            log("AGL token decode failed", { error: e.message });
                        }
                        // Try Epic's userinfo endpoint using the AGL token as a bearer token.
                        // If the app has openid scope, this returns fhirUser + name.
                        const iss = sessionStorage.getItem('smart_iss');
                        if (iss && payload) {
                            const userinfoUrl = iss.replace('/api/FHIR/R4', '/oauth2/userinfo');
                            log("Probing userinfo endpoint", { url: userinfoUrl });
                            fetch(userinfoUrl, {
                                headers: { Authorization: 'Bearer ' + payload }
                            })
                                .then(r => r.json())
                                .then(info => {
                                    log("Userinfo response", info);
                                    if (info.fhirUser || info.sub) {
                                        agentIdentity = {
                                            id: info.sub || agentIdentity.id,
                                            name: info.name || agentIdentity.name,
                                            fhirPractitionerId: info.fhirUser || agentIdentity.fhirPractitionerId,
                                            epicUserId: info.sub || agentIdentity.epicUserId,
                                            extension: agentIdentity.extension
                                        };
                                        log("Agent identity updated from userinfo", agentIdentity);
                                    }
                                })
                                .catch(e => log("Userinfo request failed", { error: e.message }));
                        }
                        connectToTCN();
                        break;
                    case "actions":
                        log("Supported AGL actions", payload);
                        break;
                    case "actionExecuted":
                        log("Action executed", payload);
                        break;
                    case "error":
                        log("AGL error", payload);
                        break;
                    case "errorCodes":
                        log("AGL error codes", payload);
                        break;
                    default:
                        log("Other AGL message: " + type, payload);
                        break;
                }
            }
        }

        // ── Entry point ───────────────────────────────────────────────────────

        async function onLoad() {
            const params = new URLSearchParams(window.location.search);
            const launch = params.get('launch');
            const iss = params.get('iss');
            const code = params.get('code');
            const state = params.get('state');

            const SMART_ENABLED = true;

            if (SMART_ENABLED && code) {
                await handleOAuthCallback(code, state);
            } else if (SMART_ENABLED && launch && iss) {
                await startSmartLaunch(launch, iss);
                return;
            } else if (launch && iss) {
                log("EHR launch params detected (SMART disabled)", { launch, iss });
                // The launch param is itself a JWT — decode it to get the Epic user's sub.
                // No signature verification needed here; we're already trusting Epic's iframe injection.
                try {
                    const launchPayload = JSON.parse(atob(launch.split('.')[1]));
                    log("Launch token decoded", launchPayload);
                    if (launchPayload.sub) {
                        agentIdentity = { ...agentIdentity, epicUserId: launchPayload.sub };
                        log("agentIdentity.epicUserId updated from launch token", { epicUserId: launchPayload.sub });
                    }
                } catch (e) {
                    log("Launch token decode failed", { error: e.message });
                }
                // Store ISS so the AGL token handler can try the userinfo endpoint
                sessionStorage.setItem('smart_iss', iss);
            }
            // Standalone/stub mode — agentIdentity stays as stub default.

            log("Page loaded");
            log("Agent identity", agentIdentity);
            window.addEventListener("message", Listener, false);
            window.parent.postMessage({
                action: "Epic.Clinical.Informatics.Web.InitiateHandshake"
            }, "*");
            log("AGL handshake requested");
        }
    </script>
</body>

</html>
