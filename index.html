<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Epic AGL Load Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 16px;
        }

        #status {
            padding: 8px;
            background: #eee;
            margin-bottom: 12px;
        }

        #log {
            white-space: pre-wrap;
            background: #111;
            color: #0f0;
            padding: 10px;
            min-height: 200px;
        }
    </style>
</head>

<body onload="onLoad()">
    <h1>HELLO FROM GITHUB PAGES</h1>
    <div id="status">Page loaded, waiting for handshake...</div>
    <pre id="log"></pre>

    <script>
        function log(msg, payload) {
            const el = document.getElementById("log");
            el.textContent += msg + (payload ? ": " + JSON.stringify(payload, null, 2) : "") + "\n\n";
            console.log(msg, payload);
        }

        function Listener(event) {
            const data = event.data || {};
            log("Message received", data);

            for (const type in data) {
                const payload = data[type];
                switch (type) {
                    case "token":
                        document.getElementById("status").textContent = "Handshake successful";
                        log("Received token", payload);
                        break;
                    case "actions":
                        log("Supported actions", payload);
                        break;
                    case "error":
                        log("Error", payload);
                        break;
                    case "errorCodes":
                        log("Error codes", payload);
                        break;
                    default:
                        log("Other message: " + type, payload);
                        break;
                }
            }
        }

        function onLoad() {
            log("Page onLoad fired");
            window.addEventListener("message", Listener, false);
            window.parent.postMessage({
                action: "Epic.Clinical.Informatics.Web.InitiateHandshake"
            }, "*");
            log("Handshake requested");
        }
    </script>
</body>

</html>
