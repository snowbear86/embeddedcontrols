<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>TCN Stub — Call Simulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 16px;
            max-width: 700px;
        }

        h1 { margin-bottom: 4px; }

        .subtitle {
            color: #666;
            font-size: 13px;
            margin-bottom: 24px;
        }

        h2 {
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #444;
            border-bottom: 1px solid #ccc;
            padding-bottom: 4px;
            margin-top: 24px;
        }

        #agent-box {
            padding: 10px;
            background: #eee;
            min-height: 40px;
            font-size: 14px;
        }

        #agent-box.connected {
            background: #e6ffe6;
            border-left: 4px solid #0a0;
        }

        #agent-detail {
            margin-top: 6px;
            font-family: monospace;
            font-size: 13px;
            white-space: pre;
        }

        button {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            background: #1a5fa8;
            color: #fff;
            border: none;
            border-radius: 4px;
            margin-top: 8px;
        }

        button:disabled {
            background: #999;
            cursor: default;
        }

        #log {
            white-space: pre-wrap;
            background: #111;
            color: #0f0;
            padding: 10px;
            min-height: 200px;
            font-size: 13px;
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <h1>TCN Stub — Call Simulator</h1>
    <p class="subtitle">
        Simulates the TCN JS SDK + backend. Open this tab alongside the Epic test harness.<br>
        Swap this page out for the real TCN JS SDK when available.
    </p>

    <h2>Agent Identity</h2>
    <div id="agent-box">Waiting for agent to connect...</div>
    <div id="agent-detail"></div>

    <h2>Call Simulator</h2>
    <button id="btn-simulate" onclick="simulateCall()" disabled>Simulate Incoming Call</button>

    <h2>Event Log</h2>
    <pre id="log"></pre>

    <script>
        // STUB: this page simulates both the TCN JS SDK (event source)
        // and TCN's backend (call routing to the correct agent).
        const tcnChannel = new BroadcastChannel("tcn-stub");

        function log(msg, payload) {
            const el = document.getElementById("log");
            const ts = new Date().toLocaleTimeString();
            el.textContent += "[" + ts + "] " + msg +
                (payload ? ": " + JSON.stringify(payload, null, 2) : "") + "\n\n";
        }

        tcnChannel.onmessage = (event) => {
            const msg = event.data;

            if (msg.tcn === "connect") {
                const box = document.getElementById("agent-box");
                box.textContent = "Agent connected: " + msg.agent.name;
                box.className = "connected";
                document.getElementById("agent-detail").textContent =
                    JSON.stringify(msg.agent, null, 2);
                document.getElementById("btn-simulate").disabled = false;
                log("Agent connected", msg.agent);
            } else {
                log("Event from iframe", msg);
            }
        };

        function simulateCall() {
            const callId = "stub-call-" + Date.now();
            const payload = {
                tcn: "call.incoming",
                callId: callId,
                callerName: "John Doe",
                callerNumber: "555-867-5309"
            };
            tcnChannel.postMessage(payload);
            log("Simulated incoming call sent", payload);
        }

        log("TCN stub ready — waiting for agent iframe to connect via BroadcastChannel");
    </script>
</body>

</html>
